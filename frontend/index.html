<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilingIQ - Document Research</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .search-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 32px;
        }

        .search-box form {
            display: flex;
            gap: 12px;
        }

        .search-box input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .search-box button {
            padding: 12px 28px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #1557b0;
        }

        .search-box button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 8px;
            padding: 16px;
            color: #c00;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .answer-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 28px;
            margin-bottom: 24px;
        }

        .answer-box h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .answer-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .sources {
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .sources h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .source-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #666;
        }

        .source-item:last-child {
            border-bottom: none;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-results svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .no-results p {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FilingIQ</h1>
            <p>Search Indian company filings and SEBI regulations</p>
        </div>

        <div class="search-box">
            <form id="searchForm">
                <input 
                    type="text" 
                    id="question" 
                    placeholder="Ask about Reliance, TCS, Infosys, SEBI regulations..." 
                    autocomplete="off"
                >
                <button type="submit" id="searchBtn">Search</button>
            </form>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const form = document.getElementById('searchForm');
        const input = document.getElementById('question');
        const btn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = input.value.trim();
            
            if (!question) return;

            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) {
                    throw new Error('API error');
                }

                const data = await response.json();

                let html = `
                    <div class="answer-box">
                        <h2>Answer</h2>
                        <div class="answer-text">${escapeHtml(data.answer)}</div>
                `;

                if (data.sources && data.sources.length > 0) {
                    html += `
                        <div class="sources">
                            <h3>Sources</h3>
                            ${data.sources.map(source => `<div class="source-item">📄 ${escapeHtml(source)}</div>`).join('')}
                        </div>
                    `;
                }

                html += '</div>';
                resultDiv.innerHTML = html;

            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        ❌ Could not connect to API. Make sure the backend is running on localhost:8000
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        });

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Focus input on load
        input.focus();
    </script>
</body>
</html>
